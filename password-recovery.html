<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Recovery – GERESU DHUKI SACCO</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>

    <style>
        :root {
            --primary: #1a6e3a;
            --primary-dark: #0f4f28;
            --primary-light: #2e8b4a;
            --gold: #d4a845;
            --gold-light: #f0d68a;
            --gold-dark: #b8922f;
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-shadow: rgba(0, 0, 0, 0.25);
            --text-white: #ffffff;
            --text-light: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.55);
            --radius: 24px;
            --radius-sm: 14px;
            --transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f0c;
            overflow: hidden;
            position: relative;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-container .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.35) saturate(1.1);
            transform: scale(1.02);
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        @keyframes slowZoom {
            0% { transform: scale(1.02) rotate(0deg); }
            100% { transform: scale(1.12) rotate(0.5deg); }
        }
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(26, 110, 58, 0.5) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(212, 168, 69, 0.2) 0%, transparent 50%),
                linear-gradient(180deg, rgba(10, 15, 12, 0.7) 0%, rgba(10, 15, 12, 0.3) 50%, rgba(10, 15, 12, 0.7) 100%);
            z-index: 1;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: 1;
            animation: floatOrb 16s ease-in-out infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; top: -100px; right: -100px; background: radial-gradient(circle, rgba(212, 168, 69, 0.35), transparent 70%); }
        .orb-2 { width: 350px; height: 350px; bottom: -80px; left: -80px; background: radial-gradient(circle, rgba(26, 110, 58, 0.4), transparent 70%); animation-delay: -5s; }
        .orb-3 { width: 200px; height: 200px; top: 40%; left: 60%; background: radial-gradient(circle, rgba(212, 168, 69, 0.2), transparent 70%); animation-delay: -10s; }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 30px) scale(0.95); }
            100% { transform: translate(10px, -10px) scale(1.02); }
        }

        .recovery-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .recovery-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius);
            padding: 42px 36px 36px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            animation: cardEntry 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            transform: translateY(30px);
            opacity: 0;
            position: relative;
            overflow: hidden;
        }
        .recovery-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.04), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        @keyframes cardEntry {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .recovery-brand {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }
        .recovery-brand .icon {
            font-size: 48px;
            color: var(--gold);
            margin-bottom: 12px;
            display: block;
        }
        .recovery-brand h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-white);
            margin-bottom: 4px;
        }
        .recovery-brand p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 6px;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .form-group label i {
            margin-right: 8px;
            color: var(--gold);
            opacity: 0.7;
        }
        .form-group .input-wrap {
            position: relative;
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition);
            overflow: hidden;
        }
        .form-group .input-wrap:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 168, 69, 0.12), inset 0 0 0 1px rgba(212, 168, 69, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }
        .form-group .input-wrap input {
            width: 100%;
            padding: 14px 18px;
            background: transparent;
            border: none;
            font-size: 15px;
            color: var(--text-white);
            font-weight: 400;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .form-group .input-wrap input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 14px;
        }
        .form-group .input-wrap .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
            transition: var(--transition);
            pointer-events: none;
        }
        .form-group .input-wrap:focus-within .input-icon {
            color: var(--gold);
        }
        .form-group .input-wrap input {
            padding-left: 48px;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0a0f0c;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 24px rgba(212, 168, 69, 0.25);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: 0.6s;
        }
        .btn-primary:hover::before { left: 100%; }
        .btn-primary:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 8px 36px rgba(212, 168, 69, 0.35); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

        .form-footer {
            margin-top: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            position: relative;
            z-index: 1;
        }
        .form-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        .form-footer a:hover { text-decoration: underline; }

        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 420px;
            width: 100%;
        }
        .toast {
            padding: 16px 22px;
            border-radius: var(--radius-sm);
            color: #fff;
            font-weight: 500;
            font-size: 14px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.35);
            animation: slideInRight 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .toast i { font-size: 20px; flex-shrink: 0; }
        .toast.success { background: rgba(26, 110, 58, 0.92); }
        .toast.error { background: rgba(231, 76, 60, 0.92); }
        .toast.warning { background: rgba(212, 168, 69, 0.92); color: #0a0f0c; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(60px) scale(0.96); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        .toast.fade-out {
            opacity: 0;
            transform: translateX(40px) scale(0.96);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 16px;
            transition: var(--transition);
            position: relative;
            z-index: 1;
        }
        .back-link:hover { color: var(--gold); }

        .fa-spinner { animation: spin 0.9s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 520px) {
            .recovery-card { padding: 30px 22px 28px; border-radius: 20px; }
            .recovery-brand h1 { font-size: 24px; }
            .recovery-brand .icon { font-size: 36px; }
            .toast-container { top: 16px; right: 16px; left: 16px; max-width: 100%; }
            .toast { padding: 14px 18px; font-size: 13px; }
        }
        @media (max-width: 400px) {
            .recovery-card { padding: 24px 16px 22px; }
            .recovery-brand h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <img class="bg-image" src="images/sacco-bg.jpg" alt="SACCO background" />
        <div class="bg-overlay"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="recovery-wrapper">
        <div class="recovery-card">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>

            <div class="recovery-brand">
                <span class="icon"><i class="fas fa-key"></i></span>
                <h1>Reset Password</h1>
                <p>Enter your email to receive a password reset link</p>
            </div>

            <form id="recoveryForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="Enter your email" required />
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="resetBtn">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>

                <div class="form-footer">
                    Remember your password? <a href="index.html">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================================
        // FIREBASE CONFIG (GERESU DHUKI SACCO)
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBeQv8YLNfFFaTEZ6pxXaAy_K8n3u8V5X4",
            authDomain: "geresu-dhuki-sacco-75329.firebaseapp.com",
            projectId: "geresu-dhuki-sacco-75329",
            storageBucket: "geresu-dhuki-sacco-75329.firebasestorage.app",
            messagingSenderId: "431325504753",
            appId: "1:431325504753:web:f7289fb88d74b82eb0b550",
            measurementId: "G-3SN99DFJXD"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = document.createElement('i');
            icon.className = type === 'error' ? 'fas fa-exclamation-circle' :
                type === 'success' ? 'fas fa-check-circle' :
                'fas fa-exclamation-triangle';
            toast.appendChild(icon);
            const text = document.createElement('span');
            text.textContent = message;
            toast.appendChild(text);
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300);
            }, 4500);
        }

        document.getElementById('recoveryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('resetBtn');
            const originalHtml = btn.innerHTML;

            if (!email) {
                showToast('Please enter your email address.', 'warning');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                await auth.sendPasswordResetEmail(email);
                showToast('✅ Password reset link sent! Check your email.', 'success');
                document.getElementById('email').value = '';
            } catch (error) {
                let msg = 'Failed to send reset link.';
                switch (error.code) {
                    case 'auth/user-not-found':
                        msg = 'No account found with this email.';
                        break;
                    case 'auth/invalid-email':
                        msg = 'Invalid email address.';
                        break;
                    default:
                        msg = error.message;
                }
                showToast('❌ ' + msg, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        });
    </script>
</body>
</html>
