<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GERESU DHUKI SACCO – Secure Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>

    <style>
        /* ============================================================
           ROOT VARIABLES
           ============================================================ */
        :root {
            --primary: #1a6e3a;
            --primary-dark: #0f4f28;
            --primary-light: #2e8b4a;
            --gold: #d4a845;
            --gold-light: #f0d68a;
            --gold-dark: #b8922f;
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-shadow: rgba(0, 0, 0, 0.25);
            --text-white: #ffffff;
            --text-light: rgba(255, 255, 255, 0.85);
            --text-muted: rgba(255, 255, 255, 0.55);
            --radius: 24px;
            --radius-sm: 14px;
            --transition: 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ============================================================
                   RESET & BASE
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f0c;
            overflow: hidden;
            position: relative;
        }

        /* ============================================================
                   ANIMATED BACKGROUND
                   ============================================================ */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-container .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.35) saturate(1.1);
            transform: scale(1.02);
            transition: transform 12s ease;
            animation: slowZoom 20s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            0% {
                transform: scale(1.02) rotate(0deg);
            }
            100% {
                transform: scale(1.12) rotate(0.5deg);
            }
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(26, 110, 58, 0.5) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(212, 168, 69, 0.2) 0%, transparent 50%),
                linear-gradient(180deg, rgba(10, 15, 12, 0.7) 0%, rgba(10, 15, 12, 0.3) 50%, rgba(10, 15, 12, 0.7) 100%);
            z-index: 1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: 1;
            animation: floatOrb 16s ease-in-out infinite alternate;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(212, 168, 69, 0.35), transparent 70%);
            animation-delay: 0s;
        }
        .orb-2 {
            width: 350px;
            height: 350px;
            bottom: -80px;
            left: -80px;
            background: radial-gradient(circle, rgba(26, 110, 58, 0.4), transparent 70%);
            animation-delay: -5s;
        }
        .orb-3 {
            width: 200px;
            height: 200px;
            top: 40%;
            left: 60%;
            background: radial-gradient(circle, rgba(212, 168, 69, 0.2), transparent 70%);
            animation-delay: -10s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -20px) scale(1.05);
            }
            66% {
                transform: translate(-20px, 30px) scale(0.95);
            }
            100% {
                transform: translate(10px, -10px) scale(1.02);
            }
        }

        /* ============================================================
                   LOGIN WRAPPER
                   ============================================================ */
        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius);
            padding: 42px 36px 36px;
            box-shadow:
                0 40px 100px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            animation: cardEntry 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            transform: translateY(30px);
            opacity: 0;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.04), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes cardEntry {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-lang {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .login-lang .lang-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 5px 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }
        .login-lang .lang-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-white);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .login-lang .lang-btn.active {
            background: var(--gold);
            color: #0a0f0c;
            border-color: var(--gold);
            box-shadow: 0 4px 16px rgba(212, 168, 69, 0.3);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }
        .brand-icon-wrap {
            display: inline-block;
            position: relative;
            margin-bottom: 14px;
        }
        .brand-icon-wrap .ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(212, 168, 69, 0.25);
            animation: pulseRing 3s ease-in-out infinite;
        }
        .brand-icon-wrap .ring:nth-child(2) {
            inset: -12px;
            animation-delay: 0.6s;
            border-color: rgba(212, 168, 69, 0.12);
        }
        @keyframes pulseRing {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.08);
                opacity: 0;
            }
        }
        .brand-icon {
            width: 76px;
            height: 76px;
            background: linear-gradient(135deg, rgba(26, 110, 58, 0.5), rgba(212, 168, 69, 0.2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 1;
            margin: 0 auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
            border-radius: 50%;
        }
        .login-brand h1 {
            font-size: 30px;
            font-weight: 800;
            color: var(--text-white);
            letter-spacing: -0.5px;
            margin-bottom: 2px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
        }
        .login-brand h1 span {
            color: var(--gold);
        }
        .login-brand p {
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 2px;
            font-size: 13px;
            text-transform: uppercase;
        }

        form {
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 6px;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .form-group label i {
            margin-right: 8px;
            color: var(--gold);
            font-size: 13px;
            opacity: 0.7;
        }
        .form-group .input-wrap {
            position: relative;
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition);
            overflow: hidden;
        }
        .form-group .input-wrap:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 168, 69, 0.12), inset 0 0 0 1px rgba(212, 168, 69, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }
        .form-group .input-wrap input {
            width: 100%;
            padding: 14px 18px;
            background: transparent;
            border: none;
            font-size: 15px;
            color: var(--text-white);
            font-weight: 400;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .form-group .input-wrap input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 14px;
        }
        .form-group .input-wrap .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
            transition: var(--transition);
            pointer-events: none;
        }
        .form-group .input-wrap:focus-within .input-icon {
            color: var(--gold);
        }
        .form-group .input-wrap input {
            padding-left: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 17px;
            padding: 6px;
            transition: var(--transition);
            border-radius: 8px;
        }
        .toggle-password:hover {
            color: var(--text-white);
            background: rgba(255, 255, 255, 0.06);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 0 28px;
            font-size: 14px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-light);
            cursor: pointer;
            font-weight: 400;
            transition: var(--transition);
        }
        .remember-me:hover {
            color: var(--text-white);
        }
        .remember-me input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .remember-me input[type="checkbox"]:checked {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 2px 12px rgba(212, 168, 69, 0.3);
        }
        .remember-me input[type="checkbox"]:checked::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: #0a0f0c;
        }
        .forgot-password {
            color: var(--text-muted);
            font-weight: 500;
            text-decoration: none;
            transition: var(--transition);
            font-size: 13px;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
        }
        .forgot-password:hover {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0a0f0c;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 24px rgba(212, 168, 69, 0.25);
            position: relative;
            overflow: hidden;
        }
        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: 0.6s;
        }
        .login-btn:hover::before {
            left: 100%;
        }
        .login-btn:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 36px rgba(212, 168, 69, 0.35);
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 4px 16px rgba(212, 168, 69, 0.15);
        }
        .login-btn i {
            font-size: 18px;
        }

        .login-footer {
            margin-top: 28px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 20px;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        .login-footer .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 8px;
        }
        .login-footer .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            transition: var(--transition);
        }
        .login-footer .footer-links a:hover {
            color: var(--gold);
        }
        .login-footer p {
            opacity: 0.6;
        }

        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 420px;
            width: 100%;
        }
        .toast {
            padding: 16px 22px;
            border-radius: var(--radius-sm);
            color: #fff;
            font-weight: 500;
            font-size: 14px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.35);
            animation: slideInRight 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .toast i {
            font-size: 20px;
            flex-shrink: 0;
        }
        .toast.error {
            background: rgba(231, 76, 60, 0.92);
        }
        .toast.success {
            background: rgba(26, 110, 58, 0.92);
        }
        .toast.warning {
            background: rgba(212, 168, 69, 0.92);
            color: #0a0f0c;
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(60px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        .toast.fade-out {
            opacity: 0;
            transform: translateX(40px) scale(0.96);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @media (max-width: 520px) {
            .login-card {
                padding: 30px 22px 28px;
                border-radius: 20px;
            }
            .login-brand h1 {
                font-size: 26px;
            }
            .brand-icon {
                width: 64px;
                height: 64px;
            }
            .brand-icon img {
                padding: 8px;
            }
            .form-group .input-wrap input {
                font-size: 14px;
                padding: 12px 16px 12px 44px;
            }
            .form-options {
                flex-wrap: wrap;
                gap: 10px;
            }
            .login-btn {
                padding: 14px;
                font-size: 15px;
            }
            .toast-container {
                top: 16px;
                right: 16px;
                left: 16px;
                max-width: 100%;
            }
            .toast {
                padding: 14px 18px;
                font-size: 13px;
            }
            .login-lang .lang-btn {
                padding: 4px 12px;
                font-size: 11px;
            }
        }
        @media (max-width: 400px) {
            .login-card {
                padding: 24px 16px 22px;
            }
            .login-brand h1 {
                font-size: 22px;
            }
            .form-group .input-wrap input {
                font-size: 13px;
                padding: 11px 14px 11px 40px;
            }
            .form-group .input-wrap .input-icon {
                left: 12px;
                font-size: 13px;
            }
            .brand-icon {
                width: 56px;
                height: 56px;
            }
            .brand-icon img {
                padding: 6px;
            }
        }

        .fa-spinner {
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        ::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
    </style>
</head>
<body>

   <!-- ============================================================
    BACKGROUND
    ============================================================ -->
    <div class="bg-container">
        <img class="bg-image" src="images/sacco-bg.jpg" alt="SACCO background" />
        <div class="bg-overlay"></div>

        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- ============================================================
    LOGIN CARD
    ============================================================ -->
    <div class="login-wrapper">
        <div class="login-card">

            <!-- Language Toggle -->
            <div class="login-lang">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="am">አማ</button>
                <button class="lang-btn" data-lang="om">OM</button>
            </div>

            <!-- Brand -->
            <div class="login-brand">
                <div class="brand-icon-wrap">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="brand-icon">
                        <img src="images/sacco-logo.png" alt="GERESU DHUKI SACCO Logo" />
                    </div>
                </div>
                <h1>GERESU DHUKI <span>SACCO</span></h1>
                <p data-i18n="brandSub">Banking System</p>

            <!-- Form -->
            <form id="loginForm" autocomplete="on">

                    <label for="email"><i class="fas fa-envelope"></i> <span data-i18n="emailLabel">Email / Username</span></label>

                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="Enter your email" required autocomplete="email" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> <span data-i18n="passwordLabel">Password</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
                        <button type="button" id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" checked />
                        <span data-i18n="rememberMe">Remember me</span>
                    </label>
                    <a href="password-recovery.html" class="forgot-password" data-i18n="forgotPassword">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span data-i18n="signIn">Sign In</span>
                </button>

                <div class="login-footer">
                    <div class="footer-links">
                        <a href="privacy-policy.html">Privacy</a>
                        <a href="terms-of-service.html">Terms</a>
                        <a href="support.html">Support</a>
                    </div>
                    <p>© 2026 GERESU DHUKI SACCO. All rights reserved. Designed by : Eng. Abdi.F Software</p>
                </div>
            </form>
        </div>
    </div>

        const translations = {

                passwordLabel: 'የይለፍ ቃል',
                rememberMe: 'አስታውሰኝ',
                forgotPassword: 'የይለፍ ቃል ረሱ?',
                signIn: 'ግባ',
                rights: 'መብቶች በሙሉ ተጠብቀዋል።'
            },
            om: {
                brandSub: 'Sistema Baankii',
                emailLabel: 'Imeelii / Maqaa Fayyadamaa',
                passwordLabel: 'Jecha Iccitii',
                rememberMe: 'Na yaadadhu',
                forgotPassword: 'Jecha iccitii irranfatte?',
                signIn: 'Seeni',
                rights: 'Mirgi hundi eegama.'
            }
        };

        let currentLang = 'en';

        function setLanguage(lang) {
            if (!translations[lang]) return;
            currentLang = lang;
            const t = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key] !== undefined) el.textContent = t[key];
            });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            localStorage.setItem('waciti-lang', lang);
        }

        function initLanguage() {
            const saved = localStorage.getItem('waciti-lang') || navigator.language.split('-')[0];
            const valid = ['en', 'am', 'om'];
            setLanguage(valid.includes(saved) ? saved : 'en');
        }

        // ============================================================
        // 3. TOAST
        // ============================================================
        function showToast(message, type = 'error') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = document.createElement('i');
            icon.className = type === 'error' ? 'fas fa-exclamation-circle' :
                type === 'success' ? 'fas fa-check-circle' :
                'fas fa-exclamation-triangle';
            toast.appendChild(icon);
            const text = document.createElement('span');
            text.textContent = message;
            toast.appendChild(text);
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300);
            }, 4500);
        }

        // ============================================================
        // 4. PAGE INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Language
            initLanguage();
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', function() { setLanguage(this.dataset.lang); });
            });

            // Redirect if already logged in
            auth.onAuthStateChanged(user => {
                if (user) window.location.href = 'pages/dashboard.html';
            });

            // Toggle password
            document.getElementById('togglePassword').addEventListener('click', function() {
                const input = document.getElementById('password');
                const icon = this.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });

            // Login
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                const btn = document.getElementById('loginBtn');
                const originalHtml = btn.innerHTML;

                if (!email || !password) {
                    showToast('Please fill in both fields.', 'warning');
                    return;
                }

                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    showToast('✅ Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = 'pages/dashboard.html'; }, 500);
                } catch (error) {
                    let msg = 'Login failed.';
                    switch (error.code) {
                        case 'auth/user-not-found':
                            msg = 'No account found.';
                            break;
                        case 'auth/wrong-password':
                            msg = 'Incorrect password.';
                            break;
                        case 'auth/invalid-email':
                            msg = 'Invalid email.';
                            break;
                        default:
                            msg = error.message;
                    }
                    showToast('❌ ' + msg, 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalHtml;
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            });
        });
    </script>
</body>
</html>
